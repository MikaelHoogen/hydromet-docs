site_name: Hydromet Docs
site_description: Levande dokumentation för hydromet-plattform, regnobservatorium och lokal observationsdata
site_url: https://mikaelhoogen.github.io/hydromet-docs/
repo_url: https://github.com/MikaelHoogen/hydromet-docs
repo_name: MikaelHoogen/hydromet-docs
edit_uri: edit/main/docs/

use_directory_urls: true

watch:
  - docs

theme:
  name: material
  language: sv
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.action.edit
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: blue
      toggle:
        icon: material/weather-night
        name: Växla till mörkt läge
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Växla till ljust läge

plugins:
  - search:
      lang: sv

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

nav:
  - Start: index.md
  - Arkitektur:
      - Översikt: architecture/overview.md
      - Hydromet kärnmodell: architecture/hydromet-core-model.md
      - Framtida observationsdomäner: architecture/observation-domains.md
      - SQL-plan: architecture/sql-plan.md
      - MQTT-meddelanden och loggerkontrakt: architecture/mqtt-message-contract.md
      - Systemhälsa och larm: architecture/system-health.md
  - Moduler:
      - Regnobservatorium: modules/rain-observatory.md
      - Klimatprediktorbaserad IDF: modules/climate-predictor-idf.md
      - Koppling till skyfallskartering: modules/skyfall-mapping-context.md
  - Projekt:
      - Roadmap: roadmap.md
      - Källor: sources.md
      - Begrepp: glossary.md
      - Changelog: changelog.md
  - ADR:
      - ADR-0001 Rådata skrivs aldrig över: adr/adr-0001-raw-data-is-sacred.md
      - ADR-0008 Hydromet core byggs före regnmodul: adr/adr-0008-hydromet-core-before-rain-module.md
